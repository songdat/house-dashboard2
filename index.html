<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Home Dashboard</title>

<!-- MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    background:#222;
    font-family: Arial;
    text-align:center;
}

h2 {
    color:white;
}

.container {
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:10px;
}

/* HOUSE */
.house {
    position: relative;
    width: 800px;
    margin:auto;
}

.house img.bg {
    width: 100%;
}

.light {
    position: absolute;
    width: 60px;
}

#l1 { top: 100px; left: 120px; }
#l2 { top: 100px; left: 500px; }
#l3 { top: 300px; left: 150px; }
#l4 { top: 300px; left: 520px; }

/* TABLE */
table {
    color:white;
    border-collapse: collapse;
    width:420px;
}

td, th {
    border:1px solid white;
    padding:6px;
    font-size:12px;
}

/* RIGHT PANEL */
.panel {
    background:white;
    padding:15px;
    border-radius:10px;
}

#status {
    color:white;
}
</style>
</head>

<body>

<h2>🏠 Smart Home Dashboard</h2>

<div class="house">
    <img src="BG.png" class="bg">

    <img id="l1" class="light" src="light_off.png">
    <img id="l2" class="light" src="light_off.png">
    <img id="l3" class="light" src="light_off.png">
    <img id="l4" class="light" src="light_off.png">
</div>

<p id="status">Connecting...</p>

<div class="container">

    <!-- LEFT: TABLE -->
    <div>
        <h3 style="color:white;">📊 ประวัติการใช้งาน</h3>

        <table id="logTable">
            <tr>
                <th>อุปกรณ์</th>
                <th>สถานะ</th>
                <th>เวลา</th>
            </tr>
        </table>
    </div>

    <!-- RIGHT: CHART -->
    <div class="panel">
        <h3>📈 วิเคราะห์การใช้งาน 24 ชั่วโมง</h3>
        <canvas id="usageChart" width="400" height="300"></canvas>
    </div>

</div>

<script>

// =====================
// DEVICE NAME (THAI)
// =====================
const deviceName = {
    l1: "หลอดไฟห้องน้ำ",
    l2: "หลอดไฟห้องนอน",
    l3: "หลอดไฟห้องทำงาน",
    l4: "หลอดไฟห้องครัว"
};

// =====================
// SUPABASE
// =====================
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://pjatqfixvxbxcbzmuabn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqYXRxZml4dnhieGNiem11YWJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODY3NjIsImV4cCI6MjA5Mjc2Mjc2Mn0.wHVKGktNuVQUsyr-ufbnO5f9U7pUA4nN0x8RttLse18"
);

// =====================
// MQTT
// =====================
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let lastState = { l1:null, l2:null, l3:null, l4:null };

// 24-hour analysis
let hourCount = Array(24).fill(0);
let chart;

// =====================
// CONNECT
// =====================
client.on("connect", () => {
    document.getElementById("status").innerText = "✅ เชื่อมต่อสำเร็จ";
    client.subscribe("home/light/yourname123");
});

// =====================
// RECEIVE DATA
// =====================
client.on("message", (topic, message) => {

    let data = JSON.parse(message.toString());

    ["l1","l2","l3","l4"].forEach(key => {
        if(data[key] !== undefined){
            checkChange(key, data[key]);
            updateUI(key, data[key]);
        }
    });
});

// =====================
// UPDATE LIGHT UI
// =====================
function updateUI(id, state){
    document.getElementById(id).src =
        (state == 1) ? "light_on.png" : "light_off.png";
}

// =====================
// CHECK CHANGE
// =====================
function checkChange(name, value){

    if(lastState[name] === null){
        lastState[name] = value;
        return;
    }

    if(lastState[name] !== value){

        let status = value == 1 ? "เปิดใช้งาน" : "ปิดใช้งาน";
        let timeISO = new Date().toISOString();

        let hour = new Date(timeISO).getHours();
        hourCount[hour]++;

        addLog(name, status, timeISO);
        saveToSupabase(name, status, timeISO);

        updateChart();

        lastState[name] = value;
    }
}

// =====================
// FORMAT TIME
// =====================
function formatTime(iso){

    const d = new Date(iso);

    const year = d.getFullYear() + 543;
    const month = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const hour = String(d.getHours()).padStart(2,'0');
    const minute = String(d.getMinutes()).padStart(2,'0');

    return `${day}/${month}/${year} ${hour}:${minute}`;
}

// =====================
// TABLE LOG
// =====================
function addLog(light, status, isoTime){

    let row = document.getElementById("logTable").insertRow(1);

    row.insertCell(0).innerText = deviceName[light]; // ✅ ภาษาไทย
    row.insertCell(1).innerText = status;
    row.insertCell(2).innerText = formatTime(isoTime);
}

// =====================
// SAVE SUPABASE
// =====================
async function saveToSupabase(light, status, time){

    await supabaseClient
        .from("light_logs")
        .insert([{
            light: deviceName[light],
            status,
            time
        }]);
}

// =====================
// CHART
// =====================
function updateChart(){

    const ctx = document.getElementById('usageChart');

    if(chart){
        chart.data.datasets[0].data = hourCount;
        chart.update();
        return;
    }

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Array.from({length:24}, (_,i)=> i+":00"),
            datasets: [{
                label: "จำนวนการใช้งาน",
                data: hourCount,
                backgroundColor: "rgba(54, 162, 235, 0.6)"
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { precision:0 }
                }
            }
        }
    });
}

// =====================
// LOAD HISTORY
// =====================
async function loadHistory(){

    const { data } = await supabaseClient
        .from("light_logs")
        .select("*")
        .order("time", { ascending: false })
        .limit(200);

    if(data){
        data.forEach(row => {

            addLog(row.light, row.status, row.time);

            let d = new Date(row.time);
            let hour = d.getHours();

            if(row.status.includes("เปิด")){
                hourCount[hour]++;
            }
        });

        updateChart();
    }
}

loadHistory();

</script>

</body>
</html>
