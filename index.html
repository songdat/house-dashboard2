<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Home AI Dashboard</title>

<!-- MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    background:#222;
    font-family: Arial;
    text-align:center;
}

h2 { color:white; }

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:10px;
}

/* HOUSE */
.house{
    position:relative;
    width:800px;
    margin:auto;
}

.house img.bg{ width:100%; }

.light{
    position:absolute;
    width:60px;
}

#l1{ top:100px; left:120px; }
#l2{ top:100px; left:500px; }
#l3{ top:300px; left:150px; }
#l4{ top:300px; left:520px; }

/* TABLE */
table{
    color:white;
    border-collapse:collapse;
    width:420px;
}

td,th{
    border:1px solid white;
    padding:6px;
    font-size:12px;
}

/* PANEL */
.panel{
    background:white;
    padding:15px;
    border-radius:10px;
    width:420px;
}

#status{
    color:white;
}
</style>
</head>

<body>

<h2>🏠 Smart Home AI Dashboard</h2>

<div class="house">
    <img src="BG.png" class="bg">

    <img id="l1" class="light" src="light_off.png">
    <img id="l2" class="light" src="light_off.png">
    <img id="l3" class="light" src="light_off.png">
    <img id="l4" class="light" src="light_off.png">
</div>

<p id="status">Connecting...</p>

<div class="container">

    <!-- LEFT TABLE -->
    <div>
        <h3 style="color:white;">📊 ประวัติการใช้งาน</h3>
        <table id="logTable">
            <tr>
                <th>อุปกรณ์</th>
                <th>สถานะ</th>
                <th>เวลา</th>
            </tr>
        </table>
    </div>

    <!-- RIGHT PANEL -->
    <div>
        <div class="panel">
            <h3>📈 วิเคราะห์ 24 ชั่วโมง</h3>
            <canvas id="usageChart" width="400" height="300"></canvas>
        </div>

        <div class="panel" style="margin-top:10px;">
            <h3>🧠 AI วิเคราะห์พฤติกรรม</h3>
            <div id="aiReport"></div>
        </div>
    </div>

</div>

<script>

// =====================
// DEVICE NAME
// =====================
const deviceName = {
    l1: "หลอดไฟห้องน้ำ",
    l2: "หลอดไฟห้องนอน",
    l3: "หลอดไฟห้องทำงาน",
    l4: "หลอดไฟห้องครัว"
};

// =====================
// SUPABASE
// =====================
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://pjatqfixvxbxcbzmuabn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqYXRxZml4dnhieGNiem11YWJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODY3NjIsImV4cCI6MjA5Mjc2Mjc2Mn0.wHVKGktNuVQUsyr-ufbnO5f9U7pUA4nN0x8RttLse18"
);

// =====================
// MQTT
// =====================
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let lastState = { l1:null, l2:null, l3:null, l4:null };

// AI DATA
let events = [];
let hourCount = Array(24).fill(0);
let chart;

// =====================
// CONNECT
// =====================
client.on("connect", () => {
    document.getElementById("status").innerText = "✅ Connected";
    client.subscribe("home/light/yourname123");
});

// =====================
// RECEIVE DATA
// =====================
client.on("message", (topic, message) => {

    let data = JSON.parse(message.toString());

    ["l1","l2","l3","l4"].forEach(key => {
        if(data[key] !== undefined){
            checkChange(key, data[key]);
            updateUI(key, data[key]);
        }
    });
});

// =====================
// UI UPDATE
// =====================
function updateUI(id, state){
    document.getElementById(id).src =
        state == 1 ? "light_on.png" : "light_off.png";
}

// =====================
// FORMAT TIME
// =====================
function formatTime(iso){

    const d = new Date(iso);

    return `${String(d.getDate()).padStart(2,'0')}/${
        String(d.getMonth()+1).padStart(2,'0')
    }/${d.getFullYear()+543} ${
        String(d.getHours()).padStart(2,'0')
    }:${
        String(d.getMinutes()).padStart(2,'0')
    }`;
}

// =====================
// CHECK CHANGE
// =====================
function checkChange(name, value){

    if(lastState[name] === null){
        lastState[name] = value;
        return;
    }

    if(lastState[name] !== value){

        let status = value == 1 ? "เปิดใช้งาน" : "ปิดใช้งาน";
        let time = new Date();

        // STORE EVENT (AI)
        events.push({
            device: name,
            state: value,
            time: time
        });

        // HOURLY ANALYSIS
        let hour = time.getHours();
        if(value == 1) hourCount[hour]++;

        addLog(name, status, time.toISOString());
        saveToSupabase(name, status, time.toISOString());

        updateChart();
        runAIAnalysis();

        lastState[name] = value;
    }
}

// =====================
// TABLE LOG
// =====================
function addLog(light, status, isoTime){

    let row = document.getElementById("logTable").insertRow(1);

    row.insertCell(0).innerText = deviceName[light];
    row.insertCell(1).innerText = status;
    row.insertCell(2).innerText = formatTime(isoTime);
}

// =====================
// SUPABASE
// =====================
async function saveToSupabase(light, status, time){

    await supabaseClient
        .from("light_logs")
        .insert([{
            light: deviceName[light],
            status,
            time
        }]);
}

// =====================
// CHART
// =====================
function updateChart(){

    const ctx = document.getElementById("usageChart");

    if(chart){
        chart.data.datasets[0].data = hourCount;
        chart.update();
        return;
    }

    chart = new Chart(ctx,{
        type:"bar",
        data:{
            labels:[...Array(24)].map((_,i)=>i+":00"),
            datasets:[{
                label:"การใช้งาน",
                data:hourCount,
                backgroundColor:"rgba(54,162,235,0.6)"
            }]
        },
        options:{
            scales:{
                y:{ beginAtZero:true, ticks:{precision:0} }
            }
        }
    });
}

// =====================
// AI ANALYSIS ENGINE
// =====================
function runAIAnalysis(){

    if(events.length === 0) return;

    let hourMap = Array(24).fill(0);

    events.forEach(e=>{
        if(e.state == 1){
            hourMap[e.time.getHours()]++;
        }
    });

    let peakHour = hourMap.indexOf(Math.max(...hourMap));

    let count = {};
    events.forEach(e=>{
        count[e.device] = (count[e.device]||0)+1;
    });

    let mostUsed = Object.keys(count).reduce((a,b)=>
        count[a]>count[b]?a:b
    );

    let duration = {};
    let lastOn = {};

    events.forEach(e=>{
        if(e.state==1){
            lastOn[e.device]=e.time;
        }else{
            if(lastOn[e.device]){
                let diff=(e.time-lastOn[e.device])/60000;
                duration[e.device]=duration[e.device]||[];
                duration[e.device].push(diff);
                lastOn[e.device]=null;
            }
        }
    });

    let avgText="";

    for(let d in duration){
        let avg=duration[d].reduce((a,b)=>a+b,0)/duration[d].length;
        avgText+=`<p>🔌 ${deviceName[d]} ≈ ${avg.toFixed(1)} นาที</p>`;
    }

    document.getElementById("aiReport").innerHTML=`
        <p>⏰ Peak Time: <b>${peakHour}:00</b></p>
        <p>📌 ใช้งานมากสุด: <b>${deviceName[mostUsed]}</b></p>
        ${avgText}
        <hr>
        <small>AI วิเคราะห์จากพฤติกรรมการใช้งานจริง</small>
    `;
}

// =====================
// LOAD HISTORY
// =====================
async function loadHistory(){

    const { data } = await supabaseClient
        .from("light_logs")
        .select("*")
        .order("time",{ascending:false})
        .limit(200);

    if(data){

        data.forEach(row=>{

            addLog(row.light,row.status,row.time);

            let d=new Date(row.time);
            if(row.status.includes("เปิด")){
                hourCount[d.getHours()]++;
            }

        });

        updateChart();
        runAIAnalysis();
    }
}

loadHistory();

</script>

</body>
</html>
