<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Home Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin:0;
    background:#222;
    text-align:center;
    font-family: Arial;
}

.house {
    position: relative;
    width: 800px;
    margin: auto;
}

.house img.bg {
    width: 100%;
}

.light {
    position: absolute;
    width: 60px;
}

/* ปรับตำแหน่งตามรูป */
#l1 { top: 100px; left: 120px; }
#l2 { top: 100px; left: 500px; }
#l3 { top: 300px; left: 150px; }
#l4 { top: 300px; left: 520px; }

table {
    margin:auto;
    color:white;
    margin-top:20px;
    border-collapse: collapse;
}

td, th {
    padding:8px;
    border:1px solid white;
}
</style>
</head>

<body>

<h2 style="color:white;">🏠 Smart Home Dashboard</h2>

<div class="house">
    <img src="BG.png" class="bg">

    <img id="l1" class="light" src="light_off.png">
    <img id="l2" class="light" src="light_off.png">
    <img id="l3" class="light" src="light_off.png">
    <img id="l4" class="light" src="light_off.png">
</div>

<h3 style="color:white;">📊 History</h3>

<table id="logTable">
<tr>
<th>Light</th>
<th>Status</th>
<th>Time</th>
</tr>
</table>

<p id="status" style="color:white;">Connecting...</p>

<script>

// ===== Supabase =====
const supabase = window.supabase.createClient(
    "https://pjatqfixvxbxcbzmuabn.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqYXRxZml4dnhieGNiem11YWJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODY3NjIsImV4cCI6MjA5Mjc2Mjc2Mn0.wHVKGktNuVQUsyr-ufbnO5f9U7pUA4nN0x8RttLse18"
);

// ===== MQTT =====
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let lastState = { l1:null, l2:null, l3:null, l4:null };

// ===== CONNECT =====
client.on("connect", () => {
    document.getElementById("status").innerText = "✅ Connected";
    client.subscribe("home/light/yourname123");
});

// ===== RECEIVE DATA =====
client.on("message", (topic, message) => {

    let data = JSON.parse(message.toString());

    checkChange("l1", data.l1);
    checkChange("l2", data.l2);
    checkChange("l3", data.l3);
    checkChange("l4", data.l4);

    update("l1", data.l1);
    update("l2", data.l2);
    update("l3", data.l3);
    update("l4", data.l4);
});

// ===== UPDATE UI =====
function update(id, state){
    let el = document.getElementById(id);
    el.src = (state == 1) ? "light_on.png" : "light_off.png";
}

// ===== CHECK CHANGE =====
function checkChange(name, value){

    if(lastState[name] === null){
        lastState[name] = value;
        return;
    }

    if(lastState[name] !== value){

        let status = value == 1 ? "opened" : "closed";
        let timeISO = new Date().toISOString();
        let timeText = formatTime(timeISO);

        addLog(name, status, timeText);
        saveToSupabase(name, status, timeISO);

        lastState[name] = value;
    }
}

// ===== FORMAT TIME =====
function formatTime(iso){
    let d = new Date(iso);
    let h = String(d.getHours()).padStart(2,'0');
    let m = String(d.getMinutes()).padStart(2,'0');
    return h + ":" + m;
}

// ===== ADD TO TABLE =====
function addLog(light, status, time){
    let table = document.getElementById("logTable");
    let row = table.insertRow(1);

    row.insertCell(0).innerText = light;
    row.insertCell(1).innerText = status;
    row.insertCell(2).innerText = time;
}

// ===== SAVE TO SUPABASE =====
async function saveToSupabase(light, status, time){
    const { error } = await supabase
        .from("light_logs")
        .insert([{ light, status, time }]);

    if(error){
        console.log("Supabase error:", error);
    }
}

// ===== LOAD HISTORY =====
async function loadHistory(){

    const { data, error } = await supabase
        .from("light_logs")
        .select("*")
        .order("time", { ascending: false })
        .limit(20);

    if(data){
        data.forEach(row => {
            addLog(row.light, row.status, formatTime(row.time));
        });
    }
}

loadHistory();

</script>

</body>
</html>
